<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denim!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper" id="ui">
        <div class="brand">Denim!</div>

        <form class="search-container">
            <input type="text" id="url-input" placeholder="Enter URL (e.g. bing.com)...">
            <button type="submit" id="launch">GO</button>
        </form>

        <div class="nav-menu">
            <div class="nav-item">MUSIC</div>
            <div class="nav-item">GAMES</div>
        </div>
    </div>

    <!-- This frame will hold the website you search -->
    <iframe id="content-viewer"></iframe>

    <script src="script.js"></script>
</body>
</html>
