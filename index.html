<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denim!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="nav-bar" class="hidden">
        <div class="nav-controls">
            <div class="nav-btn" onclick="goHome()">🏠</div>
        </div>
        <div class="url-bar-container">
            <input type="text" id="nav-url-input" spellcheck="false">
        </div>
        <div class="nav-controls">
            <div id="exit-btn" onclick="goHome()">✕</div>
        </div>
    </div>

    <div class="main-wrapper" id="ui">
        <div class="brand" id="main-title">Denim!</div>
        <form class="search-container">
            <input type="text" id="url-input" placeholder="Search the web or type a URL">
            <button type="submit" id="launch">GO</button>
        </form>
        <div class="nav-menu">
            <div class="nav-item" onclick="toggleSettings()">SETTINGS</div>
            <div class="nav-item" onclick="openMusic()">MUSIC</div>
            <div class="nav-item" onclick="alert('Games coming soon!')">GAMES</div>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="settings-content">
            <h2 id="settings-header">Settings</h2>
            <div class="set-row">
                <span>Title Color:</span>
                <input type="color" id="set-color-input" value="#ffffff">
            </div>
            <div class="settings-actions">
                <button id="save-settings" onclick="saveSettings()">Apply Changes</button>
                <button id="close-settings" onclick="toggleSettings()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="loader" class="hidden">
        <div class="spinner"></div>
    </div>

    <iframe id="content-viewer"></iframe>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
